<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户注册 - 二手书交易平台</title>
    <!-- 引入Bootstrap 5，快速美化，无需自己写大量CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">用户注册</h2>
    <!-- 提示信息：注册成功/失败/用户名重复 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <!-- 注册表单：POST提交，适配Bootstrap样式 -->
    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
        </div>
        <div class="mb-3">
            <label for="nickname" class="form-label">昵称</label>
            <input type="text" class="form-control" id="nickname" name="nickname" placeholder="请输入昵称（选填）">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">邮箱</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="请输入邮箱（选填）">
        </div>
        <div class="mb-3">
            <label for="phone" class="form-label">手机号</label>
            <input type="tel" class="form-control" id="phone" name="phone" placeholder="请输入手机号（选填）">
        </div>
        <button type="submit" class="btn btn-primary w-100">注册</button>
    </form>
    <div class="text-center mt-3">
        已有账号？<a href="{{ url_for('login') }}">立即登录</a>
    </div>
</div>
<!-- Bootstrap JS，实现提示框关闭等交互 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
