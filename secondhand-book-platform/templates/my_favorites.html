<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的收藏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light me-2" href="{{ url_for('profile') }}">返回个人中心</a>
            <a class="btn btn-light" href="{{ url_for('logout') }}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h3 class="text-center mb-4">我的收藏</h3>
    <div class="row g-4">
        {% for book in books %}
        <div class="col-md-3">
            <div class="card h-100">
                {% if book.pic %}
                <img src="/static/{{ book.pic }}" class="card-img-top" style="height:180px;object-fit:cover">
                {% else %}
                <div class="bg-light text-center p-5">无图片</div>
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">
                        <a href="{{ url_for('book_detail', book_id=book.id) }}" class="text-decoration-none text-dark">{{ book.title }}</a>
                    </h5>
                    <p class="text-muted">作者：{{ book.author or '未知' }}</p>
                    <p class="text-danger fs-5">¥{{ book.price }}</p>
                </div>
            </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5 text-muted">暂无收藏</div>
        {% endfor %}
    </div>
</div>
</body>
</html>
