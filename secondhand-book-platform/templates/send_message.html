<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>联系卖家 - {{ book.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light me-2" href="{{ url_for('book_detail', book_id=book.id) }}">返回书籍详情</a>
            <a class="btn btn-light" href="{{ url_for('profile') }}">个人中心</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <h3 class="text-center mb-4">联系卖家：{{ book.title }}</h3>

    <!-- 提示信息 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- 留言表单 -->
    <form method="POST" action="{{ url_for('send_message', book_id=book.id) }}">
        <div class="mb-3">
            <label class="form-label">留言内容 <span class="text-danger">*</span></label>
            <textarea name="content" class="form-control" rows="5" required placeholder="请输入你想咨询的问题（如：书籍几成新？能否包邮？）"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">发送留言</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
