<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布书籍</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light" href="{{ url_for('index') }}">返回首页</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <h3 class="text-center mb-4">发布二手书</h3>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
        <div class="alert alert-warning">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label>书名 *</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>作者</label>
            <input type="text" name="author" class="form-control">
        </div>
        <div class="mb-3">
            <label>价格 *</label>
            <input type="number" step="0.01" name="price" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>书籍描述</label>
            <textarea name="desc" class="form-control" rows="4"></textarea>
        </div>
        <div class="mb-3">
            <label>书籍图片</label>
            <input type="file" name="pic" class="form-control" accept="image/*">
        </div>
        <button class="btn btn-primary w-100">发布书籍</button>
    </form>
</div>
</body>
</html>
