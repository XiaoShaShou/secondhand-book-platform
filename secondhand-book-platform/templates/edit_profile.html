<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改个人信息 - 二手书平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light me-2" href="{{ url_for('profile') }}">返回个人中心</a>
            <a class="btn btn-light" href="{{ url_for('logout') }}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <h3 class="text-center mb-4">修改个人信息</h3>

    <!-- 提示信息 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- 信息修改表单（回显原有数据） -->
    <form method="POST" action="{{ url_for('edit_profile') }}">
        <div class="mb-3">
            <label class="form-label">用户名（不可修改）</label>
            <input type="text" class="form-control" value="{{ user.username }}" disabled>
        </div>
        <div class="mb-3">
            <label class="form-label">昵称</label>
            <input type="text" name="nickname" class="form-control" value="{{ user.nickname or '' }}" placeholder="请输入昵称">
        </div>
        <div class="mb-3">
            <label class="form-label">邮箱</label>
            <input type="email" name="email" class="form-control" value="{{ user.email or '' }}" placeholder="请输入邮箱（唯一）">
        </div>
        <div class="mb-3">
            <label class="form-label">手机号</label>
            <input type="tel" name="phone" class="form-control" value="{{ user.phone or '' }}" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-primary w-100">保存修改</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
