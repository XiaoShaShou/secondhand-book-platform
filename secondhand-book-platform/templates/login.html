<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 二手书交易平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="text-center mb-4">用户登录</h2>
    <!-- 提示信息区域 -->
<div class="container mt-3">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {{ msg }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>

    <!-- 登录表单 -->
    <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
            <label for="username" class="form-label">用户名 <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="username" name="username" required placeholder="请输入用户名">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">密码 <span class="text-danger">*</span></label>
            <input type="password" class="form-control" id="password" name="password" required placeholder="请输入密码">
        </div>
        <button type="submit" class="btn btn-primary w-100">登录</button>
    </form>
    <div class="text-center mt-3">
        还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
