<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>回复消息 - {{ msg.book.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light me-2" href="{{ url_for('my_messages') }}">返回我的消息</a>
            <a class="btn btn-light" href="{{ url_for('profile') }}">个人中心</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 600px;">
    <h3 class="text-center mb-4">回复：{{ msg.sender.username }}</h3>

    <!-- 原消息展示 -->
    <div class="card mb-4">
        <div class="card-header">
            <small class="text-muted">原消息（{{ msg.create_time.strftime('%Y-%m-%d %H:%M') }}）</small>
        </div>
        <div class="card-body">
            <p class="mb-0">{{ msg.content }}</p>
            <small class="text-muted mt-2 d-block">关联书籍：<a href="{{ url_for('book_detail', book_id=msg.book_id) }}">{{ msg.book.title }}</a></small>
        </div>
    </div>

    <!-- 提示信息 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- 回复表单 -->
    <form method="POST" action="{{ url_for('reply_message', msg_id=msg.id) }}">
        <div class="mb-3">
            <label class="form-label">回复内容 <span class="text-danger">*</span></label>
            <textarea name="content" class="form-control" rows="5" required placeholder="请输入你的回复内容"></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">发送回复</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
