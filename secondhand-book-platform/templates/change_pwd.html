<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修改密码 - 二手书平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">二手书平台</a>
        <div class="ms-auto">
            <a class="btn btn-light me-2" href="{{ url_for('profile') }}">返回个人中心</a>
            <a class="btn btn-light" href="{{ url_for('logout') }}">退出登录</a>
        </div>
    </div>
</nav>

<div class="container mt-5" style="max-width: 500px;">
    <h3 class="text-center mb-4">修改密码</h3>

    <!-- 提示信息 -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                    {{ msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- 密码修改表单 -->
    <form method="POST" action="{{ url_for('change_pwd') }}">
        <div class="mb-3">
            <label class="form-label">原密码 <span class="text-danger">*</span></label>
            <input type="password" name="old_pwd" class="form-control" required placeholder="请输入原密码">
        </div>
        <div class="mb-3">
            <label class="form-label">新密码 <span class="text-danger">*</span></label>
            <input type="password" name="new_pwd" class="form-control" required placeholder="请输入新密码（至少6位）">
        </div>
        <div class="mb-3">
            <label class="form-label">确认新密码 <span class="text-danger">*</span></label>
            <input type="password" name="confirm_pwd" class="form-control" required placeholder="请再次输入新密码">
        </div>
        <button type="submit" class="btn btn-primary w-100">确认修改</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
